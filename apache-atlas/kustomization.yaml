# Kustomization file for Atlas core resources.
# Usage:
#   kubectl apply -k .
# Istio resources are applied separately via:
#   kubectl apply -k istio/overlays/minikube
#   kubectl apply -k istio/overlays/cluster

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atlas-system

# Define the order of resource application
resources:
  - atlas-namespace.yaml
  - atlas-claim0-persistentvolumeclaim.yaml
  - atlas-claim1-persistentvolumeclaim.yaml
  - atlas-service.yaml
  - atlas-deployment.yaml
  # Istio CRD resources are intentionally not included here.

# Patches to ensure proper configuration
patches:
  - target:
      kind: Deployment
      name: atlas
    patch: |-
      - op: add
        path: /spec/template/metadata/annotations/sidecar.istio.io~1inject
        value: "true"

