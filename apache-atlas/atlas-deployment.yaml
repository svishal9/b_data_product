apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.35.0 (HEAD)
  labels:
    io.kompose.service: atlas
  name: atlas
  namespace: atlas-system
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: atlas
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.35.0 (HEAD)
        sidecar.istio.io/inject: "true"
      labels:
        io.kompose.service: atlas
    spec:
      containers:
        - env:
            - name: ATLAS_SERVER_OPTS
              value: -Xms1g -Xmx2g -XX:SoftRefLRUPolicyMSPerMB=0
          image: sburn/apache-atlas:latest
#          imagePullPolicy: Never
#          startupProbe:
#            exec:
#              command:
#                - sh
#                - -c
#                - curl --connect-timeout 5 http://localhost:21000/login.jsp > /dev/null
#            failureThreshold: 45
#            periodSeconds: 10
#            timeoutSeconds: 5
#          livenessProbe:
#            exec:
#              command:
#                - sh
#                - -c
#                - curl --connect-timeout 5 http://localhost:21000/login.jsp > /dev/null
#            failureThreshold: 12
#            periodSeconds: 20
#            timeoutSeconds: 5
#            initialDelaySeconds: 30
#          readinessProbe:
#            exec:
#              command:
#                - sh
#                - -c
#                - curl --connect-timeout 5 http://localhost:21000/login.jsp > /dev/null
#            initialDelaySeconds: 30
#            periodSeconds: 10
#            timeoutSeconds: 5
#            failureThreshold: 6
          name: atlas-server
          ports:
            - containerPort: 21000
              protocol: TCP
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
          volumeMounts:
            - mountPath: /apache-atlas/data
              name: atlas-claim0
            - mountPath: /apache-atlas/logs
              name: atlas-claim1
      restartPolicy: Always
      volumes:
        - name: atlas-claim0
          persistentVolumeClaim:
            claimName: atlas-claim0
        - name: atlas-claim1
          persistentVolumeClaim:
            claimName: atlas-claim1
