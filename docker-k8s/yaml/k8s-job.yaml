---
# Kubernetes Job for one-time ingestion
apiVersion: batch/v1
kind: Job
metadata:
  name: scb-ingest-job
  namespace: scb-ingestion
  labels:
    app: scb-ingestion
    environment: minikube
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: scb-ingestion
    spec:
      serviceAccountName: scb-ingestion-sa
      restartPolicy: Never

      # Downloads workbook to PVC before ingestion starts.
      initContainers:
        - name: workbook-loader
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              test -n "${WORKBOOK_URL}"
              mkdir -p /data/workbooks
              curl -fL "${WORKBOOK_URL}" -o "/data/workbooks/${WORKBOOK_FILENAME:-metadata.xlsx}"
              ls -l /data/workbooks
          envFrom:
            - secretRef:
                name: scb-workbook-source
          volumeMounts:
            - name: workbooks-volume
              mountPath: /data/workbooks

      containers:
        - name: scb-ingestion
          image: scb-ingestion:latest
          imagePullPolicy: IfNotPresent
          command: ["/opt/venv/bin/python", "scb_dp_cli.py", "ingest"]
          args: ["/data/workbooks/metadata.xlsx"]

          envFrom:
            - configMapRef:
                name: scb-atlas-config
            - secretRef:
                name: scb-atlas-credentials

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          volumeMounts:
            - name: workbooks-volume
              mountPath: /data/workbooks
              readOnly: true

      volumes:
        - name: workbooks-volume
          persistentVolumeClaim:
            claimName: scb-workbooks-pvc

---
# CronJob for scheduled ingestion (optional)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scb-ingest-scheduled
  namespace: scb-ingestion
  labels:
    app: scb-ingestion
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: scb-ingestion
            type: scheduled
        spec:
          serviceAccountName: scb-ingestion-sa
          restartPolicy: Never

          # Downloads workbook to PVC before scheduled ingestion starts.
          initContainers:
            - name: workbook-loader
              image: curlimages/curl:8.7.1
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  test -n "${WORKBOOK_URL}"
                  mkdir -p /data/workbooks
                  curl -fL "${WORKBOOK_URL}" -o "/data/workbooks/${WORKBOOK_FILENAME:-metadata.xlsx}"
                  ls -l /data/workbooks
              envFrom:
                - secretRef:
                    name: scb-workbook-source
              volumeMounts:
                - name: workbooks-volume
                  mountPath: /data/workbooks

          containers:
            - name: scb-ingestion
              image: scb-ingestion:latest
              imagePullPolicy: IfNotPresent
              command: ["/opt/venv/bin/python", "scb_dp_cli.py", "ingest"]
              args: ["/data/workbooks/metadata.xlsx"]

              envFrom:
                - configMapRef:
                    name: scb-atlas-config
                - secretRef:
                    name: scb-atlas-credentials

              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: PYTHONDONTWRITEBYTECODE
                  value: "1"

              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "2Gi"
                  cpu: "1000m"

              volumeMounts:
                - name: workbooks-volume
                  mountPath: /data/workbooks
                  readOnly: true

          volumes:
            - name: workbooks-volume
              persistentVolumeClaim:
                claimName: scb-workbooks-pvc

