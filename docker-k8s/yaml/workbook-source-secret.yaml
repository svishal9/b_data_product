---
apiVersion: v1
kind: Secret
metadata:
  name: scb-workbook-source
  namespace: scb-ingestion
  labels:
    app: scb-ingestion
type: Opaque
stringData:
  # HTTPS URL that Kyma can reach (for example, a pre-signed object storage URL).
  # Replace before deployment.
  WORKBOOK_URL: "https://example.invalid/path/to/metadata.xlsx?token=REPLACE_ME"

  # Keep metadata.xlsx unless you also change args in yaml/k8s-job.yaml.
  WORKBOOK_FILENAME: "metadata.xlsx"

