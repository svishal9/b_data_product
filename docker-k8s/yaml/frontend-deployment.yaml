apiVersion: v1
kind: Namespace
metadata:
  name: scb-frontend
  labels:
    istio-injection: enabled
    istio.io: "default"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scb-frontend
  namespace: scb-frontend
  labels:
    app: scb-frontend
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: scb-frontend
  template:
    metadata:
      labels:
        app: scb-frontend
        version: v1
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: scb-frontend
      containers:
      - name: frontend
        image: docker.io/svishal9/docker.io/svishal9/frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: API_BASE_URL
          value: "/api"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          capabilities:
            drop:
            - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - scb-frontend
              topologyKey: kubernetes.io/hostname

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: scb-frontend
  namespace: scb-frontend

---

apiVersion: v1
kind: Service
metadata:
  name: scb-frontend
  namespace: scb-frontend
  labels:
    app: scb-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: scb-frontend

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scb-frontend
  namespace: scb-frontend
spec:
  podSelector:
    matchLabels:
      app: scb-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          istio-injection: enabled
    ports:
    - protocol: TCP
      port: 80
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 8000
    - protocol: UDP
      port: 53

