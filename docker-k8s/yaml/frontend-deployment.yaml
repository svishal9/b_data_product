apiVersion: v1
kind: Namespace
metadata:
  name: scb-frontend

---

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: scb-frontend-disable-mtls
  namespace: scb-frontend
spec:
  mtls:
    mode: DISABLE

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scb-frontend
  namespace: scb-frontend
  labels:
    app: scb-frontend
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: scb-frontend
  template:
    metadata:
      labels:
        app: scb-frontend
        version: v1
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: scb-frontend
      containers:
      - name: frontend
        image: svishal9/frontend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: API_BASE_URL
          value: "/api"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - scb-frontend
              topologyKey: kubernetes.io/hostname

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: scb-frontend
  namespace: scb-frontend

---

apiVersion: v1
kind: Service
metadata:
  name: scb-frontend
  namespace: scb-frontend
  labels:
    app: scb-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: scb-frontend

