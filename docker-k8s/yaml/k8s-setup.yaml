---
# Namespace for SCB Data Product Ingestion
apiVersion: v1
kind: Namespace
metadata:
  name: scb-ingestion
  labels:
    name: scb-ingestion

---
# ConfigMap to store Atlas connection configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: scb-atlas-config
  namespace: scb-ingestion
data:
  ATLAS_SERVER_HOST: "atlas"  # Change to actual Atlas service DNS
  ATLAS_SERVER_PORT: "21000"

---
# Secret to store Atlas credentials
apiVersion: v1
kind: Secret
metadata:
  name: scb-atlas-credentials
  namespace: scb-ingestion
type: Opaque
stringData:
  ATLAS_USERNAME: "admin"
  ATLAS_PASSWORD: "admin"

---
# ServiceAccount for the ingestion job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scb-ingestion-sa
  namespace: scb-ingestion

---
# ClusterRole for job execution
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: scb-ingestion-role
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scb-ingestion-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: scb-ingestion-role
subjects:
  - kind: ServiceAccount
    name: scb-ingestion-sa
    namespace: scb-ingestion

---
# PersistentVolumeClaim for workbooks (optional - for storing workbook files)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scb-workbooks-pvc
  namespace: scb-ingestion
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard  # Use appropriate storage class for your cluster

---
# ConfigMap for sample metadata workbook (base64 encoded)
# NOTE: In production, mount the actual workbook file
apiVersion: v1
kind: ConfigMap
metadata:
  name: scb-metadata-workbook
  namespace: scb-ingestion
  labels:
    app: scb-ingestion
data:
  workbook-info.txt: |
    Excel workbook should be mounted as a volume.
    See usage in Job definition.

