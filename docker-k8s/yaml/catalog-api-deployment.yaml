apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: scb-frontend
  labels:
    app: catalog-api
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
        version: v1
      annotations:
        sidecar.istio.io/inject: "true"
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
        proxy.istio.io/config: |
          holdApplicationUntilProxyStarts: true
    spec:
      containers:
      - name: catalog-api
        image: svishal9/catalog-api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: ATLAS_URL
          value: "https://atlas.c-77b2870.kyma.ondemand.com"
        - name: ATLAS_USERNAME
          value: "admin"
        - name: ATLAS_PASSWORD
          value: "admin"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api/catalog/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /api/catalog/health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-api
  namespace: scb-frontend
  labels:
    app: catalog-api
spec:
  type: ClusterIP
  selector:
    app: catalog-api
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP

