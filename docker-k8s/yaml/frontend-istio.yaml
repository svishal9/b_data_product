apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: scb-frontend-gateway
  namespace: scb-frontend
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: scb-frontend-cert
    hosts:
    - "*"

---

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: scb-frontend-vs
  namespace: scb-frontend
spec:
  hosts:
  - "*"
  gateways:
  - scb-frontend-gateway
  http:
  # Route /api/ requests to catalog-api backend
  - match:
    - uri:
        prefix: /api/
    route:
    - destination:
        host: catalog-api
        port:
          number: 8000
      weight: 100
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
  # Route all other requests to frontend
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: scb-frontend
        port:
          number: 80
      weight: 100
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s

---

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: scb-frontend-mtls
  namespace: scb-frontend
spec:
  mtls:
    mode: PERMISSIVE

---

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: scb-frontend-dr
  namespace: scb-frontend
spec:
  host: scb-frontend
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL

---

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: catalog-api-dr
  namespace: scb-frontend
spec:
  host: catalog-api
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL

---

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: scb-frontend-authpolicy
  namespace: scb-frontend
spec:
  selector:
    matchLabels:
      app: scb-frontend
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway"]
    to:
    - operation:
        methods: ["GET", "HEAD", "OPTIONS"]
  - from:
    - source:
        principals: ["cluster.local/ns/scb-frontend/sa/scb-frontend"]
    to:
    - operation:
        methods: ["*"]

---

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: catalog-api-authpolicy
  namespace: scb-frontend
spec:
  selector:
    matchLabels:
      app: catalog-api
  action: ALLOW
  rules:
  # Allow frontend sidecar to reach catalog-api
  - from:
    - source:
        principals: ["cluster.local/ns/scb-frontend/sa/scb-frontend"]
    to:
    - operation:
        methods: ["*"]
  # Allow Istio ingress gateway to reach catalog-api for /api/ routes
  - from:
    - source:
        principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway"]
    to:
    - operation:
        methods: ["GET", "HEAD", "OPTIONS", "POST", "PUT", "DELETE"]

